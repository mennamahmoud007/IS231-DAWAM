{% load static %}
<!DOCTYPE html>
<html>
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/StyleSheet.css'%}">
</head>
 
<body class="dashboard-body">
 
    <nav class="navbar">
        <div class="logo">DAWAM</div>
        <ul class="navLinks">
            <li><a href="{% url 'dashboard' %}"> My Jobs </a></li>
            <li><a href="{% url 'addjob' %}" class="active"> Post a Job </a></li>
            <li><a href="{% url 'logout' %}"> Logout </a></li>
        </ul>
    </nav>

    <div class="dashboard-header" style="background-image: url('{% static 'pictures/DashHeaderBack.png' %}');">
        <h2>Welcome to {{ company_name }}'s Dashboard</h2>
        <p>Manage your jobs: edit, delete, or add new positions</p>
    </div>
 
    <div class="stats-bar">
        <div class="stat-card">
            <h3>TOTAL JOBS</h3>
            <p id="stat-total">0</p>
        </div>
        <div class="stat-card">
            <h3>OPEN JOBS</h3>
            <p id="stat-open">0</p>
        </div>
        <div class="stat-card">
            <h3>TOTAL APPLICATIONS</h3>
            <p id="stat-apps">0</p>
        </div>
        <div class="stat-card">
            <h3>PENDING REVIEW</h3>
            <p id="stat-pending">0</p>
        </div>
    </div>
 
    <br><br>
 
    <div class="jobs-section">
        <h2>Your Jobs</h2>
         <br>
        <div class="jobs-grid">
            <!-- Cards will be put in admin-dashboard.js file -->
        </div>
    </div>
 
    <br><br>
 
    <div class="add-job-row">
        <a href="{% url 'addjob' %}"><button><b>+ Add New Job</b></button></a>
   </div>
    <br><br>
 
    <script src="{% static 'JS/admin-dashboard.js' %}"></script>
 
</body>
</html>
